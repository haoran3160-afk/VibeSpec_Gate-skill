name: Bug report
description: Report incorrect behavior in the Skill, CLI, docs, or validation tools.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Prompt-only Lite package
        - Optional CLI overlay
        - Review engine
        - Package verifier
        - Tests or fixtures
        - Documentation
        - Maintainer tooling
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, inputs, and sanitized output. Do not include secrets.
      render: text
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checks
      options:
        - label: I have removed or masked secrets.
          required: true
        - label: This report does not include exploit instructions for a live third-party target.
          required: true

