name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test runner
        run: python -m pip install -e . pytest

      - name: Verify Lite package docs
        run: python scripts/verify_lite_package.py

      - name: Verify release metadata
        run: python scripts/verify_release_metadata.py

      - name: Run full test suite
        run: python -m pytest -q -p no:cacheprovider

      - name: Build and verify Lite archive
        run: |
          python scripts/build_lite_package_zip.py
          python scripts/verify_release_metadata.py --archive dist/vibespec-gate-lite.zip
