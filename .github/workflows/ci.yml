name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Install test runner
        run: python -m pip install pytest

      - name: Verify Lite package docs
        run: python scripts/verify_lite_package.py

      - name: Run focused tests
        run: |
          python -m pytest \
            tests/test_lite_package_verifier.py \
            tests/test_lite_release_validation.py \
            tests/test_lite_review_bundle.py \
            tests/test_lite_rc_hardening.py \
            tests/test_review_cli.py \
            tests/test_review_runner.py \
            tests/test_llm_output_quality.py \
            tests/test_llm_output_adversarial_quality.py \
            tests/test_llm_review_workspace.py
