severity:
  P0:
    meaning: "Critical, launch-blocking"
    examples:
      - "Confirmed secret/private key exposure"
      - "Public database read/write"
      - "Unauthenticated user data mutation"
  P1:
    meaning: "High, must fix before launch or expert review"
    examples:
      - "Admin route without server-side auth"
      - "IDOR/BOLA suspected"
      - "Agent has high-risk tools without approval"
  P2:
    meaning: "Medium, fix before broad public launch"
    examples:
      - "Missing rate limits"
      - "Source maps exposed"
      - "Sensitive prompt logging suspected"
  P3:
    meaning: "Low, defense-in-depth or hygiene"
    examples:
      - "Missing baseline security headers"
      - "Missing documentation"
  Info:
    meaning: "Informational status or tool availability"

gate:
  block:
    - "Any P0"
    - "P1 with sensitive data"
  review:
    - "Any P1"
    - "Sensitive project with unknown high-risk controls"
  pass_with_warnings:
    - "Only P2/P3 remain"
  pass:
    - "No material findings"
